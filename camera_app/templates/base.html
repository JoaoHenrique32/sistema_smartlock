<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLock | Acesso Facial</title>
    <style>
        /* Reset e Variáveis de Cores */
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary-blue: #3b82f6;
            --primary-hover: #2563eb;
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-light); line-height: 1.6; padding-top: 80px; }
        
        /* Header Fixo */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            z-index: 1000;
        }
        
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto; padding: 15px 20px;
        }
        
        .logo { font-size: 24px; font-weight: bold; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary-blue); }
        
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary-blue); }
        
        /* Layout Principal */
        main { max-width: 1200px; margin: 0 auto; padding: 40px 20px; min-height: 80vh; }
        
        h1 { font-size: 2.5rem; margin-bottom: 20px; color: var(--text-light); }
        h2 { font-size: 1.8rem; margin-bottom: 15px; color: var(--primary-blue); }
        p { color: var(--text-muted); margin-bottom: 20px; font-size: 1.1rem; }
        
        /* Componentes Comuns */
        .card { background-color: var(--bg-card); border-radius: 12px; padding: 30px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 30px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .btn {
            display: inline-block; padding: 12px 24px; border-radius: 8px; font-weight: bold;
            text-decoration: none; cursor: pointer; border: none; transition: background 0.3s;
        }
        .btn-primary { background-color: var(--primary-blue); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary-blue); color: var(--primary-blue); }
        .btn-outline:hover { background-color: var(--primary-blue); color: white; }

        /* Responsividade */
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 15px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    {% include 'header.html' %}
    
    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
