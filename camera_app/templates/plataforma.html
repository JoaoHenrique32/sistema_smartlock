{% extends 'base.html' %}

{% block content %}
<div style="text-align: center; max-width: 800px; margin: 0 auto;">
    <h1>Terminal de Reconhecimento</h1>
    <p>Este é o módulo de operação local. A câmera captura o feed em tempo real, processa as características biométricas e envia o veredito para a fechadura física.</p>

    <div class="card" style="padding: 20px;">
        <div style="background-color: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
            <video id="webcam" autoplay playsinline style="width: 100%; max-height: 480px;"></video>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 15px;">
            <button class="btn btn-primary" id="btn-identificar" style="background-color: #10b981;">Desbloquear Porta</button>
            <button class="btn btn-primary" id="btn-cadastrar">Cadastrar Novo Rosto</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    if (navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => video.srcObject = stream)
            .catch(err => alert("Permita o acesso à câmera!"));
    }
    // Adicione o resto do JS do btn-identificar e btn-cadastrar aqui...
</script>
{% endblock %}
